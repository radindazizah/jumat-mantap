            color: white;

            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;

        .result-box {

            padding: 20px;
            border-radius: 8px;
            text-align: left;

        }

        .highlight { background: #feebc8; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: #c05621; font-family: monospace; }
        .room-box {
            background-color: #edf2f7;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #4a5568;
        }
        .room-title { font-weight: bold; color: #2d3748; margin-bottom: 5px; font-size: 14px; }
        .room-list { margin: 0; padding-left: 20px; font-size: 13.5px; color: #4a5568; }
        .btn-zoom {
            display: inline-block;
            width: 100%;
            text-align: center;
            background-color: #2f855a;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            margin-top: 18px;
            font-weight: bold;

        }

        ol { padding-left: 20px; margin: 10px 0; font-size: 14px; line-height: 1.6; }
        li { margin-bottom: 8px; }

    function cekUndangan() {
        const inputEmail = document.getElementById('emailInput').value.trim().toLowerCase();
        const resultDiv = document.getElementById('result');
        
        if (!inputEmail) {
            alert('Silakan masukkan email terlebih dahulu.');
            return;
        }

        const peserta = daftarUndangan.find(p => p.email.toLowerCase() === inputEmail);

        if (peserta) {
            resultDiv.className = "result-box success";
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `
                <h3 style="margin-top:0;">✔️ Email Terverifikasi!</h3>
